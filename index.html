<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritualia — Книга Церемоний</title>
    <style>
        /* Базовые настройки и цвета (Тропический минимализм) */
        :root {
            --bg-color: #FBF9F6; /* Мягкий песочно-белый */
            --text-main: #2C302E; /* Глубокий графитовый */
            --accent-green: #4A5D4E; /* Приглушённый шалфейно-зелёный */
            --accent-clay: #D4A373; /* Тёплая терракота / глина */
            --card-bg: #FFFFFF;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 0 20px;
        }

        /* Контейнер */
        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 0;
        }

        /* Шапка */
        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: var(--accent-green);
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #8C92AC;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Панель управления (Поиск и Фильтры) */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 60px;
            align-items: center;
        }

        /* Выбор народа */
        .tabs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: none;
            border: 1px solid #E0DCD5;
            padding: 10px 24px;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--text-main);
            border-radius: 4px;
            transition: var(--transition);
        }

        .tab-btn:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .tab-btn.active {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            color: #fff;
        }

        /* Строка поиска */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-bottom: 1px solid #E0DCD5;
            background: transparent;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            text-align: center;
            transition: var(--transition);
        }

        .search-input:focus {
            border-bottom-color: var(--accent-clay);
        }

        .search-input::placeholder {
            color: #B3AEA6;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* Сетка ритуалов */
        .rituals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        /* Карточка ритуала */
        .ritual-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(74, 93, 78, 0.02);
            border: 1px solid #F0ECE6;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .ritual-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(74, 93, 78, 0.06);
            border-color: #E2DDD5;
        }

        .ritual-nation {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-clay);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .ritual-title {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .ritual-description {
            font-size: 0.95rem;
            color: #606662;
            font-weight: 300;
            line-height: 1.7;
        }

        .ritual-meta {
            margin-top: auto;
            padding-top: 20px;
            font-size: 0.85rem;
            border-top: 1px dashed #EAE5DD;
            color: #8C92AC;
        }

        .ritual-meta strong {
            color: #606662;
            font-weight: 400;
        }

        /* Состояние отсутствия результатов */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #B3AEA6;
            font-weight: 300;
            display: none;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .wrapper { padding: 40px 0; }
            h1 { font-size: 2rem; }
            .rituals-grid { gap: 25px; }
            .ritual-card { padding: 30px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Ritualia</h1>
        <p class="subtitle">Древние обряды, ритуалы и церемонии племён</p>
    </header>

    <div class="controls">
        <!-- Выбор народа -->
        <div class="tabs">
            <button class="tab-btn active" onclick="filterNation('all')">Все народы</button>
            <button class="tab-btn" onclick="filterNation('Илорождённые')">Илорождённые</button>
            <button class="tab-btn" onclick="filterNation('Горнокрылые')">Горнокрылые</button>
            <button class="tab-btn" onclick="filterNation('Рифогласые')">Рифогласые</button>
        </div>

        <!-- Поиск -->
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию, описанию или украшению..." oninput="filterRituals()">
        </div>
    </div>

    <!-- Сетка с ритуалами -->
    <main class="rituals-grid" id="ritualsGrid">
        <!-- Ритуалы будут сгенерированы JavaScript -->
    </main>
    
    <div id="noResults" class="no-results">По вашему запросу ничего не найдено.</div>
</div>

<script>
    // База данных без цифр в названиях
    const ritualsData = [
        // ИЛОРОЖДЁННЫЕ (9)
        { nation: "Илорождённые", title: "Пришествие во Тьму", desc: "Тса-Ма'рь проводит мокрой лапой от лба до носа новорождённого. Имя даётся на седьмую ночь: мать трижды шепчет его над спящим котёнком. Если малыш вздрагивает — имя принято. Котёнок получает мягкое, односложное имя.", status: "Рождение", decoration: "Высушенная рыбья косточка на шее." },
        { nation: "Илорождённые", title: "Тропа Забвения", desc: "Котёнка оставляют одного на Гнилой Тропе. Он должен найти дорогу обратно в лагерь до заката следующего дня. Если возвращается — становится Кх-Ани и получает наставника.", status: "Кх-Ани, 5 лун", decoration: "Ожерелье из глиняных бусин по числу прожитых лун." },
        { nation: "Илорождённые", title: "Три ночи Моргула", desc: "В полнолуние Тса-Ма'рь наносит на лоб Кх-Ани знаки грязью из Гнилого Сердца. Кх-Ани уходит в болото на три дня без еды. Если возвращается с добычей — получает взрослое имя и выбирает путь.", status: "Вор-Кхa'ш/Тс-Кха'ли, 12 лун", decoration: "Браслет из корней мангры на переднюю лапу." },
        { nation: "Илорождённые", title: "Безмолвие Гнилого Сердца", desc: "Кх-Ани спускается в Гнилое Сердце на три дня в полной темноте и тишине. Если выдерживает — становится преемником Тса-Ма'ря. Если выходит раньше — теряет право навсегда.", status: "Тса-Ма'ри", decoration: "Ожерелье из чёрных глиняных plastic с тайными знаками." },
        { nation: "Илорождённые", title: "Прикосновение Моргула", desc: "Кандидаты касаются глины. Куски опускают в воду Гнилого Сердца. Чья метка продержится дольше всех — становится Кхаларом. Тса-Ма'рь нарекает новым именем.", status: "Кхалар", decoration: "Корона из рыбьих позвонков и кусок глины с меткой Моргула на шее." },
        { nation: "Илорождённые", title: "Жертва Чёрной Воде", desc: "В полнолуние Тса-Ма'рь бросает в омут Гнилого Сердца лучшую часть добычи. Если подношение не тонет — три дня строгого поста.", status: "Подношение", decoration: "Красные нити из болотной травы на шее." },
        { nation: "Илорождённые", title: "Созерцание Топи", desc: "Раз в два сезона кот приходит на Костяные Клыки в полночь и сидит до рассвета, глядя на воду. Моргул даёт знак через сон или чувство покоя.", status: "Единение с богом", decoration: "Грязь из Гнилого Сердца на лбу и плечах." },
        { nation: "Илорождённые", title: "Сплетение Корней", desc: "Тса-Ма'рь связывает хвосты пары корнем мангры. Пара входит в воду. Когда корень размокает — его разрывают, считая, что души связаны навсегда.", status: "Брак", decoration: "Ожерелья из высушенных лягушачьих косточек." },
        { nation: "Илорождённые", title: "Возвращение в Трясину", desc: "Тело укладывают в трясину. Тса-Ма'рь поёт песнь о возвращении в болото. Если тело тонет — душа принята. Если нет — Моргул отвергает. Имена погибших не произносят. Украшения снимают и кладут рядом с телом.", status: "Похороны", decoration: "Снимаются и кладутся рядом с телом." },

        // ГОРНОКРЫЛЫЕ (9)
        { nation: "Горнокрылые", title: "Встреча с Солнцем", desc: "Тса-Ма'рь поднимает котёнка над головой и трижды поворачивает к солнцу. Имя даётся на седьмой день: мать шепчет, старейшина выкрикивает в ущелье. Если эхо возвращается — имя принято.", status: "Рождение", decoration: "Перо горного орла на лапке." },
        { nation: "Горнокрылые", title: "Испытание Пропастью", desc: "Котёнка сажают на карниз над пропастью. Он должен просидеть день и ночь не шевелясь. Если не срывается и не кричит — становится Кх-Ани.", status: "Кх-Ани, 5 лун", decoration: "Каменный браслет на переднюю лапу." },
        { nation: "Горнокрылые", title: "Нисхождение в Утробу Гор", desc: "Кх-Ани спускается в самое глубокое ущелье с верёвкой из лиан и каменным ножом. Если возвращается через три дня — выбирает путь.", status: "Вор-Кхa'ш/Тс-Кха'ли, 12 лун", decoration: "Ожерелье из мелких камешков по числу препятствий." },
        { nation: "Горнокрылые", title: "Песнь Камня-Голоса", desc: "Кх-Ани находит в горах камень, который звенит при ударе, и приносит наставнику. Если камень принят — учится читать знаки ветра и толковать сны.", status: "Тса-Ма'ри", decoration: "Связка камней-голосов на шее." },
        { nation: "Горнокрылые", title: "Восхождение на Глаз Небес", desc: "Кандидаты соревнуются: кто быстрее взберётся на Глаз Небес и принесёт кусок скалы. Победитель становится Кхаларом.", status: "Кхалар", decoration: "Корона из кусочков скалы с вершины." },
        { nation: "Горнокрылые", title: "Дары Ущелью Забытых", desc: "К Ущелью Забытых приносят сердца горных козлов, первых птиц и красивые камни. Если случается камнепад — три дня никто не спускается в ущелья.", status: "Подношение", decoration: "Венки из горного мха." },
        { nation: "Горнокрылые", title: "Шёпот Ветра", desc: "Раз в два сезона кот забирается на высокую скалу и стоит под ветром, пока не услышит его голос.", status: "Единение с богом", decoration: "Кусок скалы, найденный им самим." },
        { nation: "Горнокрылые", title: "Две Скалы — Одна Гора", desc: "Пара стоит спиной к спине на карнизе до заката. Тса-Ма'рь произносит слова. Пара обменивается камнями.", status: "Брак", decoration: "Ожерелья из горного хрусталя." },
        { nation: "Горнокрылые", title: "Возвращение Камню", desc: "Верующие хоронят в пещерах, заваливая вход камнями. Вольные оставляют на скалах для птиц. Тса-Ма'рь поёт песнь. Все расходятся не оглядываясь. Камень покойного забирает Тса-Ма'рь.", status: "Похороны", decoration: "Камень покойного забирает Тса-Ма'рь." },

        // РИФОГЛАСЫЕ (9)
        { nation: "Рифогласые", title: "Первый Вздох Океаны", desc: "Тса-Ма'рь трижды омывает лапы новорождённого в прибое. Имя даётся на седьмой день у кромки воды. Если волна уносит имя — принято.", status: "Рождение", decoration: "Маленькая ракушка на хвосте." },
        { nation: "Рифогласые", title: "Мелодия Первой Воды", desc: "Котёнок должен по памяти повторить мелодию, которую Тса-Ма'рь шепнул ему. Если воспроизводит — становится Кх-Ани.", status: "Кх-Ани, 5 лун", decoration: "Браслет из водорослей в три косы." },
        { nation: "Рифогласые", title: "Три Вопроса Жемчужного Рифа", desc: "Кх-Ани входит в воду по грудь. Тса-Ма'рь задаёт три вопроса о добре, чести и предназначении. При правильных ответах погружает с головой. Когда выныривает — получает взрослое имя.", status: "Вор-Кхa'ш/Тс-Кха'ли, 12 лун", decoration: "Ожерелье из жемчуга по числу правильных ответов." },
        { nation: "Рифогласые", title: "Грот Шепотов", desc: "Кх-Ани уходит в Грот Шепотов на три дня без еды и воды. Если возвращается и объясняет услышанные песни — становится преемником.", status: "Тса-Ма'ри", decoration: "Раковина из Грота Шепотов на шее." },
        { nation: "Рифогласые", title: "Голос Раковин", desc: "Община собирается на Жемчужном Рифе. Каждый кладёт ракушку за кандидата. Кто набрал больше всех — становится Кхаларом. Тса-Ма'рь даёт имя.", status: "Кхалар", decoration: "Корона из жемчужин всей общины." },
        { nation: "Рифогласые", title: "Жертва Приливу", desc: "Раз в луну Кхалар бросает в воду лучшую жемчужину или янтарь. Чем красивее подношение — тем дольше мир на море.", status: "Подношение", decoration: "Нити из водорослей в кольца." },
        { nation: "Рифогласые", title: "Песнь Глубины", desc: "Раз в два сезона кот заходит в воду по подбородок и слушает, пока не услышит голос Океаны.", status: "Единение с богом", decoration: "Гладкий камень, принесённый морем." },
        { nation: "Рифогласые", title: "Две Волны — Один Прилив", desc: "Пара приходит на берег в полнолуние. Тса-Ма'рь произносит слова. Пара обменивается раковинами и ныряет вместе. Если выныривают одновременно — союз принят.", status: "Брак", decoration: "Ожерелья из розовых раковин." },
        { nation: "Рифогласые", title: "Путь в Открытое Море", desc: "Тело укладывают на плот из пальмовых листьев и отправляют в море. Тса-Ма'рь поёт песнь. Если плот уходит на глубину — душа принята. Если прибивает обратно — три дня поминают. Украшения кладут на плот.", status: "Похороны", decoration: "Украшения кладут на плот." }
    ];

    let currentNation = 'all';

    // Рендеринг карточек
    function renderRituals(data) {
        const grid = document.getElementById('ritualsGrid');
        const noResults = document.getElementById('noResults');
        grid.innerHTML = '';

        if (data.length === 0) {
            noResults.style.display = 'block';
            return;
        } else {
            noResults.style.display = 'none';
        }

        data.forEach(item => {
            const card = document.createElement('article');
            card.className = 'ritual-card';
            card.innerHTML = `
                <div class="ritual-nation">${item.nation} — ${item.status}</div>
                <h2 class="ritual-title">${item.title}</h2>
                <p class="ritual-description">${item.desc}</p>
                <div class="ritual-meta">
                    <strong>Украшение:</strong> ${item.decoration}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Переключение вкладок (выбор народа)
    function filterNation(nation) {
        currentNation = nation;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent === nation || (nation === 'all' && btn.textContent === 'Все народы')) {
                btn.classList.add('active');
            }
        });

        filterRituals();
    }

    // Глобальная фильтрация по народу + поиск
    function filterRituals() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();

        const filtered = ritualsData.filter(item => {
            const matchesNation = (currentNation === 'all' || item.nation === currentNation);
            const matchesSearch = item.title.toLowerCase().includes(searchText) || 
                                  item.desc.toLowerCase().includes(searchText) ||
                                  item.decoration.toLowerCase().includes(searchText) ||
                                  item.status.toLowerCase().includes(searchText);
            return matchesNation && matchesSearch;
        });

        renderRituals(filtered);
    }

    // Первая инициализация сайта
    renderRituals(ritualsData);
</script>

</body>
</html>
